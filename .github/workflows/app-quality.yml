name: App quality

on:
  pull_request:
  push:
    branches:
      - main
      - "feat/**"
      - "codex/**"

jobs:
  app-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm depcruise
      - run: pnpm tsc --noEmit
      - run: pnpm test
